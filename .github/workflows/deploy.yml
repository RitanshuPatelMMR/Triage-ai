name: TriageAI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Test Backend ─────────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install requests

      - name: Wait for HuggingFace Space to wake up
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ritanshupatel-triageai-backend-1.hf.space/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i: Status $STATUS, waiting 15s..."
            sleep 15
          done

      - name: Run test suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python test_triageai.py

  # ── JOB 2: Deploy Backend to HuggingFace ────────────────────────────────
  deploy-backend:
    name: Deploy Backend to HuggingFace
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push backend to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend

          # Configure git
          git config --global user.email "ci@triageai.com"
          git config --global user.name "TriageAI CI"

          # Clone HuggingFace Space repo
          git clone https://ritanshupatel:$HF_TOKEN@huggingface.co/spaces/RitanshuPatel/triageai-backend-1 hf_space

          # Copy backend files to space
          cp -r agent hf_space/
          cp -r rag hf_space/
          cp -r tools hf_space/
          cp app.py hf_space/
          cp requirements.txt hf_space/
          cp Dockerfile hf_space/
          cp README_spaces.md hf_space/README.md

          # Push to HuggingFace
          cd hf_space
          git add -A
          git diff --staged --quiet || git commit -m "deploy: auto deploy from GitHub Actions - $(date +'%Y-%m-%d %H:%M')"
          git push

          echo "Backend deployed to HuggingFace!"

  # ── JOB 3: Deploy Frontend to Vercel ────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: https://ritanshupatel-triageai-backend-1.hf.space

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          npm install -g vercel
          cd frontend
          vercel --prod --token=$VERCEL_TOKEN \
            --yes \
            --env VITE_API_URL=https://ritanshupatel-triageai-backend-1.hf.space

          echo "Frontend deployed to Vercel!"
